<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="りおちの趣味部屋 シンボルマーク">
  <!-- 葉（モンステラ/ポトス）の輪郭と、万年筆のペン先を重ねて一つの形にする -->
  <path d="M24 4
           C 34 4, 43 12, 43 23
           C 43 33, 35 42, 24 44
           C 13 42, 5 33, 5 23
           C 5 12, 14 4, 24 4 Z"
        fill="#F6EFDE" stroke="#B08D57" stroke-width="1.4" />
  <!-- 葉脈がそのままペン先の切れ込みに見えるライン -->
  <path d="M24 6 L24 40" stroke="#C97B5A" stroke-width="1.6" stroke-linecap="round" fill="none" />
  <path d="M24 14 C 18 18, 14 20, 9 21" stroke="#B08D57" stroke-width="1.2" stroke-linecap="round" fill="none" />
  <path d="M24 14 C 30 18, 34 20, 39 21" stroke="#B08D57" stroke-width="1.2" stroke-linecap="round" fill="none" />
  <path d="M24 24 C 17 27, 13 29, 10 32" stroke="#B08D57" stroke-width="1.2" stroke-linecap="round" fill="none" />
  <path d="M24 24 C 31 27, 35 29, 38 32" stroke="#B08D57" stroke-width="1.2" stroke-linecap="round" fill="none" />
  <!-- ペン先の切れ込み（葉の裂け目と兼用） -->
  <path d="M24 30 L24 42" stroke="#2B2620" stroke-width="1" fill="none" />
  <circle cx="24" cy="34" r="1.3" fill="#2B2620" />
</svg>
